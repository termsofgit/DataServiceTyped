[package]
name = "termsofgit/dataservicetyped"
description = "DataServiceTyped fork with numeric value operations"
version = "1.0.3"
license = "MIT"
authors = [
    "Leif Stout <leifstout@gmail.com>",
    "Terms"
]
repository = "https://github.com/termsofgit/dataservicetyped"
registry = "https://github.com/UpliftGames/wally-index"
realm = "shared"

exclude = ["**"]
include = ["src", "src/*", "default.project.json", "wally.lock", "wally.toml", "LICENSE"]

[dependencies]
Signal = "sleitnick/signal@2.0.0"
Networker = "leifstout/networker@0.3.1"

[server-dependencies]
ProfileStore = "lm-loleris/profilestore@1.0.3"
